<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-900">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon Vine | Super Admin Controller</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            amazon: {
              gold: '#F7CA00',
              orange: '#FF9900',
              dark: '#131921',
              navy: '#232F3E'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="h-full text-gray-100 flex flex-col antialiased bg-gray-950">

  <!-- ================= AUTH SCREEN ================= -->
  <div id="authScreen" class="fixed inset-0 z-50 flex items-center justify-center bg-amazon-dark p-4">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-900 via-amazon-dark to-black opacity-80"></div>
    <div class="relative bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl w-full max-w-md shadow-2xl text-left">
      <div class="text-center mb-6">
        <div class="inline-flex items-center space-x-1.5 font-black text-xl text-white italic tracking-tight mb-2">
          <span class="text-white text-2xl font-black uppercase tracking-widest">Super Admin</span>
        </div>
        <p class="text-xs text-gray-400">System Core Security Login</p>
      </div>

      <form id="loginForm" class="space-y-4">
        <div class="space-y-1">
          <label class="text-[10px] text-gray-300 font-bold uppercase tracking-wider">Super Admin Email</label>
          <input 
            type="email" 
            id="loginEmail"
            required
            placeholder="super@amazonvine.com"
            class="w-full bg-white/5 border border-white/15 px-4 py-2.5 rounded-xl text-white text-xs placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-amazon-gold"
          />
        </div>
        <div class="space-y-1">
          <label class="text-[10px] text-gray-300 font-bold uppercase tracking-wider">Password</label>
          <input 
            type="password" 
            id="loginPassword"
            required
            placeholder="••••••••"
            class="w-full bg-white/5 border border-white/15 px-4 py-2.5 rounded-xl text-white text-xs placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-amazon-gold"
          />
        </div>
        <button 
          type="submit"
          class="w-full bg-amazon-gold hover:bg-[#e2b600] text-amazon-dark font-black text-xs py-3 rounded-xl shadow-md transition cursor-pointer mt-2"
        >
          Authorize Access
        </button>
      </form>
      <div id="loginError" class="mt-4 text-center text-xs text-red-400 font-medium hidden"></div>
    </div>
  </div>

  <!-- ================= MAIN LAYOUT SCREEN ================= -->
  <div id="mainDashboard" class="flex-1 flex flex-col overflow-hidden hidden">
    <!-- Navbar -->
    <header class="bg-amazon-dark border-b border-gray-800 h-16 px-6 flex items-center justify-between flex-shrink-0">
      <div class="flex items-center space-x-3">
        <span class="text-white text-base font-black uppercase tracking-widest">Amazon Vine</span>
        <span class="text-amazon-gold text-[9px] font-bold uppercase tracking-widest border border-amazon-gold/30 px-2 py-0.5 rounded">Super Controller</span>
      </div>
      <button 
        onclick="handleLogout()"
        class="flex items-center space-x-2 px-3 py-1.5 text-xs font-bold text-red-400 hover:bg-red-950/30 rounded-lg transition"
      >
        <i data-lucide="log-out" class="h-4 w-4"></i>
        <span>Logout</span>
      </button>
    </header>

    <!-- Workspace -->
    <main class="flex-1 overflow-y-auto p-6 md:p-8 max-w-7xl w-full mx-auto space-y-8">
      
      <!-- Pending Requests Grid -->
      <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-sm font-black uppercase tracking-wider text-gray-200">Pending Admin Applications</h2>
          <span id="pendingCountBadge" class="bg-amazon-gold text-amazon-dark text-[10px] font-black px-2 py-0.5 rounded-full">0 Requests</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-xs border-collapse">
            <thead>
              <tr class="border-b border-gray-800 text-gray-500 uppercase font-black tracking-wider">
                <th class="py-3 px-4">Admin Username</th>
                <th class="py-3 px-4">Requested On</th>
                <th class="py-3 px-4">Status</th>
                <th class="py-3 px-4 text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="pendingAdminsTable">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </section>

      <!-- Active Admin Accounts Grid -->
      <section class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-4">
        <h2 class="text-sm font-black uppercase tracking-wider text-gray-200 font-sans">Authorized Operators</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-left text-xs border-collapse">
            <thead>
              <tr class="border-b border-gray-800 text-gray-500 uppercase font-black tracking-wider">
                <th class="py-3 px-4">Admin Username</th>
                <th class="py-3 px-4">Password (Plaintext)</th>
                <th class="py-3 px-4">Authorized On</th>
                <th class="py-3 px-4 text-right">Operations</th>
              </tr>
            </thead>
            <tbody id="activeAdminsTable">
              <!-- Dynamically populated -->
            </tbody>
          </table>
        </div>
      </section>

    </main>
  </div>

  <!-- Reset Password Modal -->
  <div id="resetModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 p-4 hidden">
    <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl w-full max-w-sm space-y-4">
      <h3 class="text-sm font-black uppercase tracking-wider text-gray-200">Change Admin Password</h3>
      <input type="hidden" id="resetAdminId">
      <div class="space-y-1">
        <label class="text-[10px] text-gray-400 font-bold uppercase">New Plaintext Password</label>
        <input 
          type="text" 
          id="newPlaintextPassword"
          placeholder="Enter new plaintext password"
          class="w-full bg-gray-950 border border-gray-800 px-3 py-2 rounded-lg text-white text-xs placeholder-gray-600 focus:outline-none focus:ring-1 focus:ring-amazon-gold"
        />
      </div>
      <div class="flex items-center justify-end space-x-3 pt-2">
        <button onclick="closeResetModal()" class="text-xs text-gray-400 hover:text-white px-3 py-2 transition font-bold">Cancel</button>
        <button onclick="submitPasswordReset()" class="bg-amazon-gold hover:bg-[#e2b600] text-amazon-dark font-black text-xs px-4 py-2 rounded-lg transition shadow">Save Password</button>
      </div>
    </div>
  </div>

  <script>
    let superToken = localStorage.getItem('super_auth_token') || null;

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');

      try {
        const res = await fetch('/api/auth/super/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          errEl.classList.remove('hidden');
          return;
        }
        superToken = data.token;
        localStorage.setItem('super_auth_token', superToken);
        initializeDashboard();
      } catch (err) {
        errEl.textContent = 'Server connection error';
        errEl.classList.remove('hidden');
      }
    });

    function handleLogout() {
      localStorage.removeItem('super_auth_token');
      superToken = null;
      document.getElementById('authScreen').classList.remove('hidden');
      document.getElementById('mainDashboard').classList.add('hidden');
    }

    async function initializeDashboard() {
      document.getElementById('authScreen').classList.add('hidden');
      document.getElementById('mainDashboard').classList.remove('hidden');
      lucide.createIcons();
      fetchAdmins();
    }

    async function fetchAdmins() {
      try {
        const res = await fetch('/api/auth/super/admins', {
          headers: { 'Authorization': `Bearer ${superToken}` }
        });
        if (!res.ok) return handleLogout();
        const admins = await res.json();

        const pending = admins.filter(a => a.status === 'pending');
        const active = admins.filter(a => a.status === 'active');

        document.getElementById('pendingCountBadge').textContent = `${pending.length} Requests`;

        // Render Pending
        const pendingTbody = document.getElementById('pendingAdminsTable');
        if (pending.length === 0) {
          pendingTbody.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-gray-600 font-bold">No pending administrator applications.</td></tr>`;
        } else {
          pendingTbody.innerHTML = pending.map(a => `
            <tr class="border-b border-gray-800 hover:bg-gray-900/50 transition">
              <td class="py-3 px-4 font-bold text-gray-300 font-mono">${a.username}</td>
              <td class="py-3 px-4 text-gray-500">${new Date(a.created_at).toLocaleString()}</td>
              <td class="py-3 px-4"><span class="px-2 py-0.5 rounded bg-yellow-950/40 text-yellow-500 text-[10px] font-extrabold uppercase border border-yellow-800/30">Pending</span></td>
              <td class="py-3 px-4 text-right space-x-2">
                <button onclick="approveAdmin('${a.id}')" class="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold px-3 py-1 rounded text-[10px] uppercase transition cursor-pointer">Approve</button>
                <button onclick="deleteAdmin('${a.id}')" class="bg-red-950/40 text-red-400 hover:bg-red-900/40 font-extrabold px-3 py-1 rounded text-[10px] uppercase border border-red-800/20 transition cursor-pointer">Reject</button>
              </td>
            </tr>
          `).join('');
        }

        // Render Active
        const activeTbody = document.getElementById('activeAdminsTable');
        if (active.length === 0) {
          activeTbody.innerHTML = `<tr><td colspan="4" class="py-6 text-center text-gray-600 font-bold">No active administrator accounts configured.</td></tr>`;
        } else {
          activeTbody.innerHTML = active.map(a => `
            <tr class="border-b border-gray-800 hover:bg-gray-900/50 transition">
              <td class="py-3 px-4 font-bold text-gray-300 font-mono">${a.username}</td>
              <td class="py-3 px-4 text-gray-400 font-bold font-mono">${a.password}</td>
              <td class="py-3 px-4 text-gray-500">${new Date(a.created_at).toLocaleString()}</td>
              <td class="py-3 px-4 text-right space-x-2">
                <button onclick="openResetModal('${a.id}')" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-extrabold px-2.5 py-1 rounded text-[10px] uppercase transition cursor-pointer">Reset Pass</button>
                <button onclick="deleteAdmin('${a.id}')" class="bg-red-950/50 text-red-500 hover:bg-red-900 text-white font-extrabold px-2.5 py-1 rounded text-[10px] uppercase transition cursor-pointer">Delete</button>
              </td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function approveAdmin(id) {
      if (!confirm('Authorize this administrator account?')) return;
      try {
        const res = await fetch(`/api/auth/super/admins/${id}/approve`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${superToken}` }
        });
        if (res.ok) fetchAdmins();
      } catch (err) {
        alert('Action failed');
      }
    }

    async function deleteAdmin(id) {
      if (!confirm('Are you absolutely sure you want to reject/delete this administrator account?')) return;
      try {
        const res = await fetch(`/api/auth/super/admins/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${superToken}` }
        });
        if (res.ok) fetchAdmins();
      } catch (err) {
        alert('Action failed');
      }
    }

    function openResetModal(id) {
      document.getElementById('resetAdminId').value = id;
      document.getElementById('newPlaintextPassword').value = '';
      document.getElementById('resetModal').classList.remove('hidden');
    }

    function closeResetModal() {
      document.getElementById('resetModal').classList.add('hidden');
    }

    async function submitPasswordReset() {
      const id = document.getElementById('resetAdminId').value;
      const password = document.getElementById('newPlaintextPassword').value;
      if (!password) return alert('Password cannot be empty');

      try {
        const res = await fetch(`/api/auth/super/admins/${id}/reset-password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${superToken}`
          },
          body: JSON.stringify({ password })
        });
        if (res.ok) {
          closeResetModal();
          fetchAdmins();
        } else {
          alert('Failed to reset password');
        }
      } catch (err) {
        alert('Action failed');
      }
    }

    // Auto load session
    if (superToken) {
      initializeDashboard();
    }
  </script>
</body>
</html>
